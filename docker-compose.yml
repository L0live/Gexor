# ============================================================================
# Gexor — Docker Compose
# ============================================================================
# Usage:
#   docker compose up -d          # Start all services
#   docker compose up -d --build  # Rebuild & start
#   docker compose down            # Stop all
#   docker compose logs -f         # Follow logs
#   docker compose logs backend    # Backend logs only
#
# App: http://localhost:3080
# ============================================================================

services:
  # ── PostgreSQL ────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: gexor
      POSTGRES_USER: gexor
      POSTGRES_PASSWORD: gexor
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./docker/postgres-init.sh:/docker-entrypoint-initdb.d/init.sh:ro
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gexor -d gexor"]
      interval: 5s
      timeout: 3s
      retries: 10

  # ── Backend (Fastify) ────────────────────────────────────────────────────
  backend:
    build:
      context: .
      dockerfile: docker/backend.Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 3001
      HOST: 0.0.0.0
      PGHOST: postgres
      PGPORT: 5432
      PGDATABASE: gexor
      PGUSER: gexor
      PGPASSWORD: gexor
      CORS_ORIGIN: "http://localhost:3080"
      LOG_LEVEL: info
    ports:
      - "3001:3001"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:3001/api/health"]
      interval: 10s
      timeout: 5s
      start_period: 10s
      retries: 5

  # ── Frontend (Vite build → nginx) ────────────────────────────────────────
  frontend:
    build:
      context: .
      dockerfile: docker/frontend.Dockerfile
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "3080:80"

volumes:
  pgdata:
